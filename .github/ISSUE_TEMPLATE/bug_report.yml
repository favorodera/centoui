name: Bug Report
description: Report a bug or unexpected behavior
title: '[Bug]: '
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: input
    id: reproduction-link
    attributes:
      label: Reproduction Link
      description: Link to a minimal reproduction (StackBlitz, CodeSandbox, GitHub repo)
      placeholder: 'https://stackblitz.com/edit/...'
    validations:
      required: false

  - type: textarea
    id: code-snippet
    attributes:
      label: Code Snippet
      description: If you don't have a live reproduction, paste a minimal code snippet here. Wrap it in a fenced code block with the appropriate language (e.g. ` ```js `, ` ```vue `, ` ```ts `).
    validations:
      required: false

  - type: input
    id: package-version
    attributes:
      label: Package & Version
      description: Which package and version are you using?
      placeholder: e.g. your-package-name@1.0.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: e.g. 24.0.0
    validations:
      required: true

  - type: input
    id: package-manager
    attributes:
      label: Package Manager & Version
      placeholder: e.g. pnpm 10.0.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: 'e.g. Windows 11, macOS 14'
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if applicable)
      placeholder: e.g. Chrome 120
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Screenshots, logs, or anything else that might help.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true