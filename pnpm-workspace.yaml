packages:
  - "apps/*"
  - "playgrounds/*"
  - "packages/*"

nodeOptions: "--max_old_space_size=4096"
shellEmulator: true

peerDependencyRules:
  allowedVersions:
    vite: "8"
    typescript: "6"

verifyDepsBeforeRun: false

allowBuilds:
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  esbuild: true
  unrs-resolver: true
  vue-demi: true
  better-sqlite3: true
  sharp: true

