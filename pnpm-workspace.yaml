minimumReleaseAgeExclude:
  - relizy@1.4.9
  - '@favorodera/eslint-config@1.0.4'
shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver@6.3.1
  - nanoid@3.3.14

packages:
  - 'apps/*'
  - 'packages/*'

nodeOptions: --max_old_space_size=4096
verifyDepsBeforeRun: false

allowBuilds:
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  better-sqlite3: true
  esbuild: true
  sharp: true

  unrs-resolver: true
  vue-demi: true
catalogs:
  peer:
    nuxt: ^4.0.0

    vue: ^3.0.0
  tools:
    '@favorodera/eslint-config': ^1.0.4
    '@nuxt/eslint': ^1.16.0
    '@nuxt/module-builder': ^1.0.2
    '@nuxt/schema': ^4.4.8
    '@tsconfig/node24': ^24.0.4
    '@types/fs-extra': ^11.0.4
    '@types/node': ^25.9.3
    '@vitejs/plugin-vue': ^6.0.7
    '@vitest/ui': ^4.1.8
    '@vue/tsconfig': ^0.9.0
    eslint: ^10.5.0
    relizy: ^1.4.9
    tsdown: ^0.22.2
    tsx: ^4.22.4
    turbo: ^2.9.18
    typescript: ^6.0.3
    vite: ^8.0.16
    vitest: ^4.1.8
    vue-tsc: ^3.3.5
    yaml: ^2.9.0
  vendor:
    '@clack/prompts': ^1.5.1
    '@iconify/vue': ^5.0.1
    '@nuxt/content': ^3.15.0
    '@nuxt/fonts': ^0.14.0
    '@nuxt/icon': ^2.3.1
    '@nuxt/image': ^2.0.0
    '@nuxt/kit': ^4.4.8
    '@nuxtjs/color-mode': ^4.0.1
    '@nuxtjs/mcp-toolkit': ^0.18.0
    '@nuxtjs/seo': ^5.3.2
    '@tailwindcss/vite': ^4.3.1
    '@takumi-rs/core': 2.0.0-rc.16
    '@vercel/analytics': ^2.0.1
    '@vueuse/core': ^14.3.0
    better-sqlite3: ^12.11.1
    c12: ^4.0.0-beta.5
    citty: ^0.2.2
    fs-extra: ^11.3.5
    notform: ^2.2.0
    notform-nuxt: ^2.2.0
    nuxt: ^4.4.8
    nuxt-llms: ^0.2.0
    nuxt-og-image: ^6.7.2
    nuxt-schema-org: ^6.2.3
    nypm: ^0.6.7
    pathe: ^2.0.3
    pinia: ^3.0.4
    reka-ui: ^2.9.10
    tailwind-merge: ^3.6.0
    tailwind-variants: ^3.2.2
    tailwindcss: ^4.3.1
    tw-animate-css: ^1.4.0
    vue: ^3.5.38
    vue-router: ^5.0.7
    zod: ^4.4.3
peerDependencyRules:
  allowedVersions:
    typescript: '6'

    vite: '8'
